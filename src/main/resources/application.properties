spring.application.name=events
server.port=8081

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator
management.info.env.enabled=true

management.graphite.metrics.export.enabled=true
management.graphite.metrics.export.host=172.17.0.3
management.graphite.metrics.export.port=2004
management.graphite.metrics.export.protocol=pickled
management.graphite.metrics.export.step=10s

management.graphite.metrics.export.graphite-tags-enabled=false
management.graphite.metrics.export.tags-as-prefix=application

management.metrics.tags.application=events